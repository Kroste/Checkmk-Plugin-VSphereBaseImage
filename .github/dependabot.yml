version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    ignore:
      # FluentAssertions v8 = kommerzielle Xceed-Lizenz — nicht auto-updaten.
      - dependency-name: "FluentAssertions"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
