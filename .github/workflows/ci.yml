name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # MinVer braucht die Tags

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Checkmk-Plugin-VSphereBaseImage.slnx

      - name: Build
        run: dotnet build Checkmk-Plugin-VSphereBaseImage.slnx -c Release --no-restore
